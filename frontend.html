<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA - RAG Local con Partículas</title>
    <style>
        /* Estilos base */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ── EL CONTENEDOR DE LAS PARTÍCULAS ── */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1; /* Queda al fondo */
        }

        /* Contenedor del Chat flotando sobre las partículas */
        .chat-container {
            position: relative;
            z-index: 2; /* Queda por encima de las partículas */
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: rgba(26, 26, 30, 0.85); /* Un poco transparente para ver el fondo */
            backdrop-filter: blur(8px); /* Efecto cristal esmerilado */
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2c2c35;
            margin: 10vh auto; /* Centrado en la pantalla */
        }

        .chat-header {
            padding: 15px 20px;
            background: #202024;
            border-bottom: 1px solid #2c2c35;
            font-weight: bold;
            font-size: 1.1em;
            color: #00ff88;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-message {
            background: #00ff88;
            color: #121214;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            font-weight: 500;
        }

        .ia-message {
            background: #2c2c35;
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #3f3f4e;
        }

        .loading-message {
            color: #8a8a93;
            font-style: italic;
            align-self: flex-start;
            font-size: 0.9em;
        }

        .chat-input-area {
            padding: 15px 20px;
            background: #202024;
            border-top: 1px solid #2c2c35;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            background: #121214;
            border: 1px solid #2c2c35;
            border-radius: 6px;
            color: white;
            font-size: 1em;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #00ff88;
        }

        button {
            padding: 12px 20px;
            background: #00ff88;
            color: #121214;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
        }

        button:hover {
            background: #00cc6a;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="chat-container">
        <div class="chat-header">🤖 Asistente RAG Local (Modo Estricto)</div>
        <div class="chat-messages" id="chatBox">
            <div class="message ia-message">¡Hola, Pablo! Las partículas ya volvieron a su lugar. Hazme cualquier pregunta basada en tus datos.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta aquí..." autocomplete="off">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
// ── 2. CONFIGURACIÓN COMPLETA DE LOS PUNTITOS ORIGINALES (CORREGIDO) ──
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00ff88" }, /* Color verde neón a juego */
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#00ff88", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" }, /* CAMBIADO: Ahora crea enlaces con el ratón */
                    "onclick": { "enable": true, "mode": "push" },    /* Creas más al hacer clic */
                    "resize": true
                },
                "modes": {
                    "grab": {
                        "distance": 180, /* Qué tan lejos se estiran los enlaces hacia tu ratón */
                        "line_linked": { "opacity": 0.8 } /* Intensidad del brillo del enlace */
                    }
                }
            },
            "retina_detect": true
        });

        // ── 3. LÓGICA DEL CHAT CON EL BACKEND ──
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function enviarPreguntaALaIA(textoPregunta) {
            const loadingId = mostrarMensajeEnPantalla('Buscando en la base de datos...', 'loading-message');

            try {
                const response = await fetch('http://localhost:5000/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: textoPregunta })
                });

                document.getElementById(loadingId).remove();

                if (!response.ok) throw new Error('Error en la respuesta del servidor');
                const data = await response.json();
                mostrarMensajeEnPantalla(data.answer, 'ia-message');

            } catch (error) {
                console.error('Hubo un problema:', error);
                document.getElementById(loadingId).remove();
                mostrarMensajeEnPantalla('Error al conectar con el servidor.', 'ia-message');
            }
        }

        function mostrarMensajeEnPantalla(texto, clase) {
            const mensajeDiv = document.createElement('div');
            const idUnico = 'msg-' + Date.now();
            mensajeDiv.id = idUnico;
            mensajeDiv.classList.add('message', clase);
            mensajeDiv.innerText = texto;
            chatBox.appendChild(mensajeDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return idUnico;
        }

        function procesarEnvio() {
            const texto = userInput.value.trim();
            if (texto === '') return;
            mostrarMensajeEnPantalla(texto, 'user-message');
            userInput.value = '';
            enviarPreguntaALaIA(texto);
        }

        sendBtn.addEventListener('click', procesarEnvio);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') procesarEnvio();
        });
    </script>
</body>
</html>
